syntax = "proto3";

package analysis;

service AnalysisService {
    rpc AnalyzeEmail (EmailAnalysisRequest) returns (EmailAnalysisResponse);
}

message EmailAnalysisRequest {
    string email_id = 1;
    string sender = 2;
    string subject = 3;
    string content = 4;
    repeated string urls = 5;
    bool has_attachment = 6;
}

message EmailAnalysisResponse {
    int32 score = 1;
    string risk_level = 2;
    repeated string justifications = 3;
}
